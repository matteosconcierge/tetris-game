<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Neon Snake</title>
    <style>
        body {
            margin: 0; padding: 0; background: #0a0a0c;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #00ffcc;
        }
        canvas {
            background: #111116;
            border: 4px solid #00ffcc;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.4);
            max-width: 90vw; max-height: 70vh;
            border-radius: 10px;
        }
        #score { font-size: 32px; font-weight: bold; margin-bottom: 20px; text-shadow: 0 0 10px #00ffcc; }
        .back-btn {
            margin-top: 20px; padding: 10px 20px;
            background: transparent; color: #00ffcc;
            text-decoration: none; border: 2px solid #00ffcc;
            border-radius: 5px; font-weight: bold;
            transition: background 0.3s, color 0.3s;
        }
        .back-btn:hover { background: #00ffcc; color: #000; }
    </style>
</head>
<body>
    <div id="score">Score: 0</div>
    <canvas id="snake" width="400" height="400"></canvas>
    <a href="../index.html" class="back-btn">Back to Arcade</a>
    <script src="script.js"></script>
</body>
</html>
