<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Flight Sim</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #ui {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #0f0;
            text-shadow: 1px 1px #000;
            pointer-events: none;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #0f0;
            text-align: center;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            text-align: center;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 10px;
            font-size: 0.9em;
        }
        .back-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: #444;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            z-index: 100;
        }
        .desktop-only { display: inline; }
        .mobile-only { display: none; }
        @media (max-width: 768px) {
            .desktop-only { display: none; }
            .mobile-only { display: inline; }
            #ui { font-size: 0.8em; top: 10px; }
            #controls { font-size: 0.7em; width: 80%; }
        }
    </style>
</head>
<body>
    <div id="ui">
        Speed: <span id="speed">0</span> kn<br>
        Altitude: <span id="alt">0</span> ft
    </div>
    <div id="controls">
        <span class="desktop-only">W/S: Pitch | A/D: Roll | Space: Throttle</span>
        <span class="mobile-only">Swipe: Pitch/Roll | 2 Fingers: Throttle</span>
    </div>
    <a href="../index.html" class="back-btn">Back to Arcade</a>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module" src="script.js"></script>
</body>
</html>
