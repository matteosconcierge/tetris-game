<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Station 402 - Tactical FPS Masterpiece</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050505; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; touch-action: none; }
        canvas { display: block; }
        
        /* HUD Style */
        #hud {
            position: absolute;
            top: 30px;
            left: 30px;
            right: 30px;
            pointer-events: none;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            color: #fff;
            text-transform: uppercase;
        }

        .hud-widget {
            background: rgba(10, 10, 10, 0.7);
            padding: 15px 20px;
            border-radius: 5px;
            backdrop-filter: blur(10px);
            border-left: 4px solid #ff3300;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .hud-label { font-size: 10px; letter-spacing: 2px; color: #aaa; }
        .hud-value { font-size: 24px; font-weight: bold; font-family: monospace; transition: color 0.3s; }
        #health-value { color: #00ffcc; text-shadow: 0 0 10px rgba(0, 255, 204, 0.5); }
        #kill-value { color: #ff3300; text-shadow: 0 0 10px rgba(255, 51, 0, 0.5); }

        /* Crosshair */
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            transform: translate(-50%, -50%);
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            pointer-events: none;
            z-index: 50;
        }
        #crosshair::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 2px; height: 2px;
            background: #fff;
            transform: translate(-50%, -50%);
        }

        /* Mobile Controls */
        #mobile-controls {
            position: absolute;
            bottom: 40px;
            left: 40px;
            right: 40px;
            height: 150px;
            pointer-events: none;
            z-index: 1000;
            display: none; 
        }

        #joystick-base {
            position: absolute;
            bottom: 0; left: 0;
            width: 120px; height: 120px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            pointer-events: auto;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        #joystick-pad {
            position: absolute;
            top: 50%; left: 50%;
            width: 50px; height: 50px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        #fire-button {
            position: absolute;
            bottom: 0; right: 0;
            width: 90px; height: 90px;
            background: rgba(255, 51, 0, 0.4);
            border-radius: 50%;
            pointer-events: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: bold;
            border: 3px solid #ff3300;
            box-shadow: 0 0 20px rgba(255, 51, 0, 0.3);
            user-select: none;
        }

        #ui-container {
            position: absolute;
            top: 120px;
            left: 30px;
            background: rgba(10, 10, 10, 0.85);
            padding: 15px 20px;
            border-radius: 12px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .label { font-size: 9px; text-transform: uppercase; letter-spacing: 2px; color: #aaa; font-weight: bold; }
        input[type=range] { -webkit-appearance: none; width: 140px; height: 3px; background: #333; border-radius: 2px; outline: none; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; background: #fff; border-radius: 50%; cursor: pointer; }

        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.9) 100%); display: flex; align-items: center; justify-content: center; z-index: 2000; color: #fff; text-align: center; cursor: pointer; }
        #controls-help { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.4); z-index: 50; font-size: 11px; font-family: monospace; pointer-events: none; text-transform: uppercase; }
    </style>
</head>
<body>
    <div id="overlay">
        <div>
            <h1 style="letter-spacing: 5px;">STATION 402: TACTICAL</h1>
            <p>CLICK TO INITIALIZE COMBAT LINK</p>
            <p style="font-size: 12px; color: #aaa;">WASD: MOVE | SPACE: JUMP | CLICK: FIRE</p>
        </div>
    </div>

    <div id="hud">
        <div class="hud-widget">
            <span class="hud-label">Vitality System</span>
            <span id="health-value" class="hud-value">100 / 100</span>
        </div>
        <div class="hud-widget" style="border-left-color: #00ffcc;">
            <span class="hud-label">Tactical Decommissions</span>
            <span id="kill-value" class="hud-value">0</span>
        </div>
    </div>

    <div id="ui-container">
        <span class="label">Exposure Level</span>
        <input type="range" id="exposure" min="0.1" max="5.0" step="0.01" value="2.8">
    </div>

    <div id="crosshair"></div>
    <div id="controls-help">[WASD] MOVE | [SPACE] JUMP | [CLICK] FIRE | [ESC] UNLOCK</div>

    <div id="mobile-controls">
        <div id="joystick-base">
            <div id="joystick-pad"></div>
        </div>
        <div id="fire-button">FIRE</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // --- CLASSES (TOP - FIXED FOR REDERENCEERROR) ---
        class Bullet {
            constructor(startPos, targetPos, color, isPlayer, scene, controls, drones, playerDamage) {
                const geo = new THREE.SphereGeometry(0.1, 8, 8);
                const mat = new THREE.MeshStandardMaterial({ color: color, emissive: color, emissiveIntensity: 10 });
                this.mesh = new THREE.Mesh(geo, mat);
                this.mesh.position.copy(startPos);
                this.direction = new THREE.Vector3().subVectors(targetPos, startPos).normalize();
                this.speed = 0.8;
                this.isPlayer = isPlayer;
                this.startTime = performance.now();
                this.scene = scene;
                this.controls = controls;
                this.drones = drones;
                this.playerDamage = playerDamage;
            }
            update() {
                this.mesh.position.addScaledVector(this.direction, this.speed);
                if (!this.isPlayer) {
                    const dist = this.mesh.position.distanceTo(this.controls.getObject().position);
                    if (dist < 1.0) {
                        this.playerDamage(10);
                        return true;
                    }
                } else {
                    for (let i = this.drones.length - 1; i >= 0; i--) {
                        if (this.mesh.position.distanceTo(this.drones[i].mesh.position) < 1.0) {
                            if (this.drones[i].takeDamage()) this.drones.splice(i, 1);
                            return true;
                        }
                    }
                }
                return (performance.now() - this.startTime > 5000);
            }
        }

        class Drone {
            constructor(scene, drones, bullets, controls, playerDamage, spawnCallback) {
                const geo = new THREE.OctahedronGeometry(0.6, 0);
                const mat = new THREE.MeshStandardMaterial({ color: 0x00ffcc, emissive: 0x00ffcc, emissiveIntensity: 5, metalness: 0.9, roughness: 0.1 });
                this.mesh = new THREE.Mesh(geo, mat);
                // Confined spawn: within platform length and visible width
                // Confined spawn: strictly within platform length (X) and away from back wall (Z)
                // Front of the back wall is at Z: -9. Platform ends at Z: 9.
                this.mesh.position.set(Math.random()*160-80, 5+Math.random()*4, -5 + Math.random()*12);
                this.theta = Math.random() * Math.PI * 2;
                this.orbitRadius = 3 + Math.random() * 4; // Much smaller orbit to stay visible and in-bounds
                this.speed = 0.01 + Math.random() * 0.01;
                this.lastShotTime = performance.now();
                this.health = 2;
                this.scene = scene;
                this.drones = drones;
                this.bullets = bullets;
                this.controls = controls;
                this.playerDamage = playerDamage;
                this.spawnCallback = spawnCallback;
            }
            update(time, playerPos) {
                this.theta += this.speed;
                // Confine drone movement to platform area [x: -90 to 90, z: -8.5 to 8.5]
                // Back wall starts at -9, Train at 9+.
                let targetX = playerPos.x + Math.sin(this.theta) * this.orbitRadius;
                let targetZ = playerPos.z + Math.cos(this.theta) * this.orbitRadius;
                
                this.mesh.position.x = Math.max(-90, Math.min(90, targetX));
                this.mesh.position.z = Math.max(-8.5, Math.min(8.5, targetZ));
                this.mesh.position.y = 6 + Math.sin(time * 0.5) * 2;
                this.mesh.rotation.y += 0.05; this.mesh.rotation.x += 0.02;
                if (performance.now() - this.lastShotTime > 3000 + Math.random() * 2000) {
                    const bullet = new Bullet(this.mesh.position, playerPos, 0xff3300, false, this.scene, this.controls, this.drones, this.playerDamage);
                    this.bullets.push(bullet);
                    this.scene.add(bullet.mesh);
                    this.lastShotTime = performance.now();
                }
            }
            takeDamage() {
                this.health--;
                if (this.health <= 0) {
                    this.scene.remove(this.mesh);
                    const kv = document.getElementById('kill-value');
                    kv.innerText = parseInt(kv.innerText) + 1;
                    setTimeout(() => this.spawnCallback(), 5000);
                    return true;
                }
                return false;
            }
        }

        // --- GLOBALS ---
        let scene, camera, renderer, controls, ambientLight;
        let neons = [], clocks = [], vendingMachines = [], cameras = [], ledSign;
        let playerHealth = 100, killCount = 0, isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false, canJump = false;
        let velocity = new THREE.Vector3(), direction = new THREE.Vector3(), prevTime = performance.now();
        let drones = [], bullets = [], lastFireTime = 0, joystickInput = { x: 0, y: 0 }, joystickTouchId = null;

        function spawnDrone() {
            const drone = new Drone(scene, drones, bullets, controls, playerDamage, spawnDrone);
            drones.push(drone);
            scene.add(drone.mesh);
        }

        function fireBullet() {
            const time = performance.now();
            if (time - lastFireTime < 250) return;
            lastFireTime = time;
            const startPos = controls.getObject().position.clone();
            const dir = new THREE.Vector3();
            camera.getWorldDirection(dir);
            startPos.addScaledVector(dir, 1);
            const targetPos = startPos.clone().addScaledVector(dir, 100);
            const bullet = new Bullet(startPos, targetPos, 0x00ffcc, true, scene, controls, drones, playerDamage);
            bullets.push(bullet);
            scene.add(bullet.mesh);
        }

        function playerDamage(amt) {
            playerHealth -= amt;
            if (playerHealth < 0) playerHealth = 0;
            document.getElementById('health-value').innerText = `${playerHealth} / 100`;
            renderer.domElement.style.border = '5px solid red';
            setTimeout(() => renderer.domElement.style.border = 'none', 100);
            if (playerHealth <= 0) { alert("DECOMMISSIONED. REBOOTING SYSTEM."); location.reload(); }
        }

        function setupMobileJoystick() {
            const base = document.getElementById('joystick-base'), pad = document.getElementById('joystick-pad');
            const rect = base.getBoundingClientRect(), cx = rect.left + rect.width / 2, cy = rect.top + rect.height / 2;
            base.addEventListener('touchstart', (e) => { joystickTouchId = e.targetTouches[0].identifier; handleMove(e.targetTouches[0]); });
            window.addEventListener('touchmove', (e) => { if (joystickTouchId !== null) { for (let t of e.changedTouches) if (t.identifier === joystickTouchId) handleMove(t); } });
            window.addEventListener('touchend', (e) => { for (let t of e.changedTouches) if (t.identifier === joystickTouchId) { joystickTouchId = null; joystickInput = { x: 0, y: 0 }; pad.style.left = '50%'; pad.style.top = '50%'; } });
            function handleMove(t) {
                const dx = t.pageX - cx, dy = t.pageY - cy, dist = Math.sqrt(dx*dx + dy*dy), max = rect.width / 2;
                const angle = Math.atan2(dy, dx), cd = Math.min(dist, max);
                const lx = Math.cos(angle) * cd, ly = Math.sin(angle) * cd;
                pad.style.left = `calc(50% + ${lx}px)`; pad.style.top = `calc(50% + ${ly}px)`;
                joystickInput.x = lx / max; joystickInput.y = ly / max;
            }
        }

        function init() {
            // --- BASE SETUP ---
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020202);
            scene.fog = new THREE.FogExp2(0x020202, 0.02);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 3, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 2.8;

            document.body.appendChild(renderer.domElement);

            // --- CONTROLS ---
            controls = new PointerLockControls(camera, document.body);
            document.getElementById('overlay').addEventListener('click', () => controls.lock());
            controls.addEventListener('lock', () => document.getElementById('overlay').style.display = 'none');
            controls.addEventListener('unlock', () => document.getElementById('overlay').style.display = 'flex');
            scene.add(controls.getObject());

            // Keyboard logic
            document.addEventListener('keydown', (e) => {
                switch(e.code) {
                    case 'KeyW': moveForward = true; break; case 'KeyS': moveBackward = true; break;
                    case 'KeyA': moveLeft = true; break; case 'KeyD': moveRight = true; break;
                    case 'Space': if(canJump) { velocity.y += 25; canJump = false; } break;
                }
            });
            document.addEventListener('keyup', (e) => {
                switch(e.code) {
                    case 'KeyW': moveForward = false; break; case 'KeyS': moveBackward = false; break;
                    case 'KeyA': moveLeft = false; break; case 'KeyD': moveRight = false; break;
                }
            });
            document.addEventListener('mousedown', () => { if(controls.isLocked) fireBullet(); });

            if (isMobile) {
                document.getElementById('mobile-controls').style.display = 'block';
                setupMobileJoystick();
                document.getElementById('fire-button').addEventListener('touchstart', (e) => { e.preventDefault(); fireBullet(); });
                let lx = 0, ly = 0;
                renderer.domElement.addEventListener('touchstart', (e) => { if (e.target.id.includes('joystick') || e.target.id === 'fire-button') return; lx = e.touches[0].pageX; ly = e.touches[0].pageY; });
                renderer.domElement.addEventListener('touchmove', (e) => {
                    if (e.target.id.includes('joystick') || e.target.id === 'fire-button') return;
                    camera.rotation.y -= (e.touches[0].pageX - lx) * 0.005;
                    camera.rotation.x -= (e.touches[0].pageY - ly) * 0.005;
                    lx = e.touches[0].pageX; ly = e.touches[0].pageY;
                    camera.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, camera.rotation.x));
                }, { passive: false });
            }

            // --- ENVIRONMENT (MASTERPIECE RESTORATION) ---
            const steelMat = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 1, roughness: 0.3 });
            
            // Floor
            const floorGroup = new THREE.Group();
            const floorGeo = new THREE.PlaneGeometry(200, 40, 100, 20);
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x151515, roughness: 0.15, metalness: 0.8 });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            floorGroup.add(floor);

            // Puddles
            const puddleMat = new THREE.MeshStandardMaterial({ color: 0x0a0a0a, roughness: 0.0, metalness: 1.0, transparent: true, opacity: 0.7 });
            for(let i=0; i<15; i++) {
                const p = new THREE.Mesh(new THREE.CircleGeometry(Math.random()*4+1, 32), puddleMat);
                p.rotation.x = -Math.PI/2; p.position.set(Math.random()*160-80, 0.01, Math.random()*15-5); p.scale.set(1.5, 1, 1); floorGroup.add(p);
            }
            scene.add(floorGroup);

            // Warning Strip
            const strip = new THREE.Mesh(new THREE.PlaneGeometry(200, 1.5), new THREE.MeshStandardMaterial({ color: 0xffcc00, roughness: 0.3, metalness: 0.4 }));
            strip.rotation.x = -Math.PI/2; strip.position.set(0, 0.02, 9); scene.add(strip);
            
            // Tracks area
            const tracksGeo = new THREE.PlaneGeometry(200, 30);
            const tracksMat = new THREE.MeshStandardMaterial({ color: 0x050505, roughness: 1 });
            const tracks = new THREE.Mesh(tracksGeo, tracksMat);
            tracks.rotation.x = -Math.PI/2; tracks.position.y = -1.2; tracks.position.z = 25; scene.add(tracks);

            // Rails
            const railMat = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 1, roughness: 0.2 });
            for(let z of [16, 20, 30, 34]) {
                const rail = new THREE.Mesh(new THREE.BoxGeometry(200, 0.3, 0.5), railMat);
                rail.position.set(0, -1, z); scene.add(rail);
            }

            // Back Wall with Grout
            const backWall = new THREE.Mesh(new THREE.BoxGeometry(200, 18, 2), new THREE.MeshStandardMaterial({ color: 0x2a2a2a }));
            backWall.position.set(0, 8.5, -10); scene.add(backWall);
            for(let i=-100; i<=100; i+=10) {
                const line = new THREE.Mesh(new THREE.BoxGeometry(0.05, 18, 2.1), new THREE.MeshStandardMaterial({ color: 0x000000 }));
                line.position.set(i, 8.5, -10); scene.add(line);
            }

            // Pillars
            for(let i=-80; i<=80; i+=40) {
                const p = new THREE.Mesh(new THREE.BoxGeometry(2.5, 12, 2.5), steelMat);
                p.position.set(i, 5.5, 6); p.castShadow = p.receiveShadow = true; scene.add(p);
            }

            // Ceiling and Pipes
            const ceiling = new THREE.Mesh(new THREE.PlaneGeometry(200, 60), new THREE.MeshStandardMaterial({ color: 0x080808 }));
            ceiling.rotation.x = Math.PI/2; ceiling.position.y = 12; ceiling.position.z = 10; scene.add(ceiling);
            for(let i=0; i<6; i++) {
                const pipe = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 200), new THREE.MeshStandardMaterial({ color: i%2===0?0x885533:0x222222, metalness: 1 }));
                pipe.rotation.z = Math.PI/2; pipe.position.set(0, 11, -8 + i*4); scene.add(pipe);
            }

            // LIGHTING
            ambientLight = new THREE.AmbientLight(0xffffff, 0.15); scene.add(ambientLight);
            for(let i=-80; i<=80; i+=40) {
                const g = new THREE.Group();
                const tube = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.15, 12), new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xffffff, emissiveIntensity: 10 }));
                tube.rotation.z = Math.PI/2; g.add(tube);
                const l = new THREE.PointLight(0xffffff, 600, 50, 2); l.position.y = -1; l.castShadow = true; g.add(l);
                g.position.set(i, 11.5, 2); scene.add(g);
                neons.push({ light: l, tube, base: 600 });
            }

            // Billboards
            for(let i=-60; i<=60; i+=60) {
                const adColor = i===0?0x00ffcc:0xff3300;
                const canvas = document.createElement('canvas'); canvas.width=512; canvas.height=256;
                const ctx = canvas.getContext('2d'); ctx.fillStyle='#0a0a0a'; ctx.fillRect(0,0,512,256);
                ctx.strokeStyle=adColor; ctx.lineWidth=15; ctx.strokeRect(10,10,492,236);
                ctx.fillStyle=adColor; ctx.font='bold 80px Arial'; ctx.textAlign='center'; ctx.fillText(i===0?'CYBER':'DANGER', 256, 120);
                const tex = new THREE.CanvasTexture(canvas);
                const mesh = new THREE.Mesh(new THREE.BoxGeometry(12, 7, 0.6), new THREE.MeshStandardMaterial({ map: tex, emissiveMap: tex, emissive: adColor, emissiveIntensity: 1.5 }));
                mesh.position.set(i, 6, -9); scene.add(mesh);
                const adl = new THREE.PointLight(adColor, 150, 20); adl.position.set(i, 6, -6); scene.add(adl);
            }

            // Benches
            const oakMat = new THREE.MeshStandardMaterial({ color: 0xffaa44, roughness: 0.5 });
            for(let i=-60; i<=60; i+=40) {
                if(i===0) continue;
                const g = new THREE.Group();
                const s = new THREE.Mesh(new THREE.BoxGeometry(6.5, 0.4, 3), oakMat); s.position.y = 1.4; g.add(s);
                const b = new THREE.Mesh(new THREE.BoxGeometry(6.5, 1.8, 0.4), oakMat); b.position.set(0, 2.5, -1.3); g.add(b);
                const lLeg = new THREE.Mesh(new THREE.BoxGeometry(0.3, 1.2, 2.5), steelMat); lLeg.position.set(-2.8, 0.6, 0); g.add(lLeg);
                const rLeg = new THREE.Mesh(new THREE.BoxGeometry(0.3, 1.2, 2.5), steelMat); rLeg.position.set(2.8, 0.6, 0); g.add(rLeg);
                g.position.set(i, 0, -6); scene.add(g);
                const bl = new THREE.PointLight(0xffffff, 50, 10); bl.position.set(i, 8, -6); scene.add(bl);
            }

            // Clocks
            for(let i=-60; i<=60; i+=120) {
                const face = new THREE.Mesh(new THREE.CircleGeometry(1, 32), new THREE.MeshStandardMaterial({ color: 0x000000, emissive: 0xff3300, emissiveIntensity: 2 }));
                face.position.set(i, 9.5, 8.4); scene.add(face); clocks.push(face);
            }

            // Train
            const carMat = new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 1, roughness: 0.2 });
            for(let i=0; i<3; i++) {
                const car = new THREE.Mesh(new THREE.BoxGeometry(50, 8, 7), carMat);
                car.position.set(i * 55 - 55, 4, 30); scene.add(car);
                for(let w = -20; w <= 20; w += 8) {
                    const win = new THREE.Mesh(new THREE.BoxGeometry(4, 2.5, 7.2), new THREE.MeshStandardMaterial({ color: 0x000000, emissive: 0xffffff, emissiveIntensity: 0.3 }));
                    win.position.set(i * 55 - 55 + w, 5.5, 30); scene.add(win);
                }
            }

            // Detail Objects
            for(let i=0; i<10; i++) {
                const canvas = document.createElement('canvas'); canvas.width=256; canvas.height=128;
                const ctx = canvas.getContext('2d'); ctx.font='bold 60px Courier'; ctx.fillStyle='#ff00ff'; ctx.fillText('VANDAL', 10, 80);
                const tex = new THREE.CanvasTexture(canvas);
                const g = new THREE.Mesh(new THREE.PlaneGeometry(6, 3), new THREE.MeshStandardMaterial({ map: tex, transparent: true, opacity: 0.6 }));
                g.position.set(Math.random()*180-90, 4+Math.random()*4, -8.99); scene.add(g);
            }
            for(let i=-60; i<=60; i+=120) {
                const m = new THREE.Group();
                const body = new THREE.Mesh(new THREE.BoxGeometry(4, 8.5, 3), new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.8 })); m.add(body);
                const p = new THREE.Mesh(new THREE.PlaneGeometry(3, 7.5), new THREE.MeshStandardMaterial({ color: 0x000000, emissive: 0x00ffcc, emissiveIntensity: 2 }));
                p.position.z = 1.51; m.add(p);
                const l = new THREE.PointLight(0x00ffcc, 100, 10); l.position.z = 3; m.add(l);
                m.position.set(i+20, 4.25, -8.5); scene.add(m); vendingMachines.push({ panel: p, light: l, phase: Math.random()*Math.PI });
            }
            for(let i=-180; i<=180; i+=60) {
                const cam = new THREE.Group();
                const housing = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.4, 1.2), steelMat); housing.rotation.x = Math.PI/2.5; cam.add(housing);
                const lens = new THREE.Mesh(new THREE.CircleGeometry(0.2, 16), new THREE.MeshStandardMaterial({ color: 0x000000, emissive: 0xff0000, emissiveIntensity: 2 }));
                lens.position.z = 0.6; housing.add(lens); cam.position.set(i, 11, -8.8); scene.add(cam); cameras.push(lens);
            }

            // Dust
            const dGeo = new THREE.BufferGeometry(); const dPos = new Float32Array(5000*3);
            for(let i=0; i<5000*3; i+=3) { dPos[i] = Math.random()*200-100; dPos[i+1] = Math.random()*15; dPos[i+2] = Math.random()*40-10; }
            dGeo.setAttribute('position', new THREE.BufferAttribute(dPos, 3));
            scene.add(new THREE.Points(dGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.05, transparent: true, opacity: 0.15 })));

            // LED Sign
            const ledCanvas = document.createElement('canvas'); ledCanvas.width = 1024; ledCanvas.height = 128;
            const ledCtx = ledCanvas.getContext('2d'); const ledTex = new THREE.CanvasTexture(ledCanvas);
            const ls = new THREE.Mesh(new THREE.BoxGeometry(10, 1.2, 0.4), new THREE.MeshStandardMaterial({ map: ledTex, emissiveMap: ledTex, emissive: 0xff3300, emissiveIntensity: 2 }));
            ls.position.set(0, 10, 8.5); scene.add(ls);
            ledSign = { canvas: ledCanvas, ctx: ledCtx, tex: ledTex, offset: 0 };

            // Game Spawns
            for(let i=0; i<5; i++) spawnDrone();

            // UI
            document.getElementById('exposure').addEventListener('input', (e) => {
                const val = parseFloat(e.target.value);
                renderer.toneMappingExposure = val;
                ambientLight.intensity = 0.15 * (val / 2.8);
            });

            window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now() * 0.001, delta = Math.min((performance.now() - prevTime) / 1000, 0.1);
            prevTime = performance.now();
            if (!controls) return;

            // Combat & Spawns
            const pPos = controls.getObject().position;
            drones.forEach(d => d.update(time, pPos));
            for(let i=bullets.length-1; i>=0; i--) if(bullets[i].update()) { scene.remove(bullets[i].mesh); bullets.splice(i, 1); }

            // Movement Physics
            velocity.x -= velocity.x * 10 * delta; velocity.z -= velocity.z * 10 * delta; velocity.y -= 9.8 * 10 * delta;
            direction.z = Number(moveForward) - Number(moveBackward); direction.x = Number(moveRight) - Number(moveLeft);
            direction.normalize();
            if(isMobile && (Math.abs(joystickInput.x) > 0.1 || Math.abs(joystickInput.y) > 0.1)) { direction.z = -joystickInput.y; direction.x = joystickInput.x; }
            if(moveForward || moveBackward || (isMobile && Math.abs(joystickInput.y) > 0.1)) velocity.z -= direction.z * 400 * delta;
            if(moveLeft || moveRight || (isMobile && Math.abs(joystickInput.x) > 0.1)) velocity.x -= direction.x * 400 * delta;
            controls.moveRight(-velocity.x * delta); controls.moveForward(-velocity.z * delta);

            // --- SPATIAL BOUNDARIES (Collision Detection) ---
            const playerObj = controls.getObject();
            // Confine player to platform area
            // Back wall is at -10, Train is at 30, but platform safe edge is around 8.5
            playerObj.position.x = Math.max(-95, Math.min(95, playerObj.position.x));
            playerObj.position.z = Math.max(-8.5, Math.min(8.5, playerObj.position.z));

            playerObj.position.y += velocity.y * delta;
            if(playerObj.position.y < 4) { velocity.y = 0; playerObj.position.y = 4; canJump = true; }

            // Animations (Neons, LED, Vending)
            neons.forEach(n => { if(Math.random() > 0.99) { n.light.intensity = n.base * 0.2; setTimeout(() => n.light.intensity = n.base, 100); } });
            clocks.forEach(f => f.material.emissiveIntensity = 3 + (Math.sin(time * 2) + 1) * 4);
            cameras.forEach(l => l.material.emissiveIntensity = 1 + (Math.sin(time * 3) + 1) * 2);
            vendingMachines.forEach(v => { const p = (Math.sin(time * 0.5 + v.phase) + 1) * 0.5; v.panel.material.emissiveIntensity = 1 + p * 3; v.light.intensity = 50 + p * 100; });
            if(ledSign) {
                ledSign.offset -= 3; if(ledSign.offset < -2000) ledSign.offset = 1024;
                ledSign.ctx.fillStyle = '#000'; ledSign.ctx.fillRect(0,0,1024,128); ledSign.ctx.fillStyle = '#ff3300'; ledSign.ctx.font = 'bold 70px Courier';
                ledSign.ctx.fillText('STATION 402 - TACTICAL LINK ACTIVE - WATCH FOR DRONES - ', ledSign.offset, 90); ledSign.tex.needsUpdate = true;
            }
            
            renderer.render(scene, camera);
        }

        init();
        animate();
    </script>
</body>
</html>
