<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Station 402 - Emergency Visibility Fix</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        canvas { display: block; }
        #ui {
            position: absolute; top: 20px; left: 20px;
            background: rgba(255, 255, 255, 0.9); padding: 20px; border-radius: 10px;
            color: #000; z-index: 1000; border: 2px solid #000;
        }
        input { width: 200px; }
        .label { font-weight: bold; font-size: 14px; margin-bottom: 5px; }
    </style>
</head>
<body>
    <div id="ui">
        <div class="label">BRIGHTNESS CONTROL</div>
        <input type="range" id="exposure" min="0.1" max="10.0" step="0.1" value="5.0">
        <div style="font-size: 10px; margin-top: 5px; color: #666;">Move slider to the right if dark</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, controls, ambientLight, mainLight;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x222222); // Not black background

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(-30, 10, 30);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            // REMOVED TONE MAPPING for pure visibility test
            document.body.appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.target.set(0, 2, 0);
            controls.update();

            // --- LIGHTING (MEGA BRIGHT) ---
            ambientLight = new THREE.AmbientLight(0xffffff, 2.0); // Extreme ambient
            scene.add(ambientLight);

            mainLight = new THREE.DirectionalLight(0xffffff, 2.0);
            mainLight.position.set(10, 50, 10);
            scene.add(mainLight);

            // --- STATION OBJECTS ---

            // Floor (Light Gray to reflect light)
            const floor = new THREE.Mesh(
                new THREE.BoxGeometry(400, 1, 100),
                new THREE.MeshStandardMaterial({ color: 0x888888 })
            );
            floor.position.y = -0.5;
            scene.add(floor);

            // Platform Warning (Orange Block - SOLID)
            const strip = new THREE.Mesh(
                new THREE.BoxGeometry(400, 0.2, 2),
                new THREE.MeshStandardMaterial({ color: 0xffaa00 })
            );
            strip.position.set(0, 0.1, 10);
            scene.add(strip);

            // THE BENCHES (ULTRA ROBUST BLOCKS)
            const benchSteel = new THREE.MeshStandardMaterial({ color: 0x444444 });
            const benchWood = new THREE.MeshStandardMaterial({ color: 0xff8800 }); // Neon Orange Wood

            for(let i = -100; i <= 100; i += 50) {
                const bench = new THREE.Group();
                
                // Huge base block (Instead of legs)
                const base = new THREE.Mesh(new THREE.BoxGeometry(8, 1, 3), benchSteel);
                base.position.y = 0.5;
                bench.add(base);

                // Huge seat block
                const seat = new THREE.Mesh(new THREE.BoxGeometry(8.2, 0.8, 3.2), benchWood);
                seat.position.y = 1.4;
                bench.add(seat);

                // Huge backrest block
                const back = new THREE.Mesh(new THREE.BoxGeometry(8.2, 3, 0.8), benchWood);
                back.position.set(0, 3, -1.2);
                bench.add(back);

                bench.position.set(i, 0, -5);
                scene.add(bench);
            }

            // Pillars (White to ensure visibility)
            for(let i = -120; i <= 120; i += 40) {
                const p = new THREE.Mesh(
                    new THREE.BoxGeometry(4, 20, 4),
                    new THREE.MeshStandardMaterial({ color: 0xffffff })
                );
                p.position.set(i, 10, 8);
                scene.add(p);
            }

            // Slider Logic
            document.getElementById('exposure').addEventListener('input', (e) => {
                const val = parseFloat(e.target.value);
                ambientLight.intensity = val;
                mainLight.intensity = val;
            });

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
