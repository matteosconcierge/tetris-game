<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Station 402 - Masterpiece Restoration</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050505; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; }
        
        #ui-container {
            position: absolute;
            top: 30px;
            left: 30px;
            background: rgba(10, 10, 10, 0.85);
            padding: 20px 25px;
            border-radius: 15px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            user-select: none;
        }

        .label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #aaa;
            font-weight: bold;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 180px;
            height: 4px;
            background: #333;
            border-radius: 2px;
            outline: none;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px; height: 18px;
            background: #fff;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(255,255,255,0.3);
        }

        #interaction-hint {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
            color: rgba(255,255,255,0.3);
            font-size: 11px;
            letter-spacing: 2px;
            pointer-events: none;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div id="ui-container">
        <span class="label">Atmosphere Exposure</span>
        <input type="range" id="exposure" min="0.1" max="4.0" step="0.01" value="2.0">
    </div>

    <div id="interaction-hint">Touch to Rotate • Pinch to Zoom • Drag with two fingers to Pan</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, controls, ambientLight;
        let neons = [];
        let clocks = [];
        let ledSign;
        let vendingMachines = [];
        let cameras = [];

        init();
        animate();

        function init() {
            // --- BASE SETUP ---
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020202);
            scene.fog = new THREE.FogExp2(0x020202, 0.02);

            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(-18, 3, 15);

            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 2.8;

            document.body.appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.minDistance = 2;
            controls.maxDistance = 60;
            controls.target.set(0, 2, 0);
            controls.maxPolarAngle = Math.PI / 2 + 0.05;

            // --- STATION MAPPING ---
            const textureLoader = new THREE.TextureLoader();

            // Floor: High-detail Tiles with puddles
            const floorGroup = new THREE.Group();
            const floorGeo = new THREE.PlaneGeometry(200, 40, 100, 20);
            const floorMat = new THREE.MeshStandardMaterial({ 
                color: 0x151515, 
                roughness: 0.15,
                metalness: 0.8
            });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            floorGroup.add(floor);

            // Puddles (Mirror-like circles)
            const puddleMat = new THREE.MeshStandardMaterial({ 
                color: 0x0a0a0a, 
                roughness: 0.0, 
                metalness: 1.0, 
                transparent: true, 
                opacity: 0.7 
            });
            for(let i=0; i<15; i++) {
                const puddle = new THREE.Mesh(new THREE.CircleGeometry(Math.random()*4 + 1, 32), puddleMat);
                puddle.rotation.x = -Math.PI / 2;
                puddle.position.set(Math.random()*160 - 80, 0.01, Math.random()*15 - 5);
                puddle.scale.set(1.5, 1, 1);
                floorGroup.add(puddle);
            }
            scene.add(floorGroup);

            // Yellow Warning Strip
            const strip = new THREE.Mesh(
                new THREE.PlaneGeometry(200, 1.5),
                new THREE.MeshStandardMaterial({ color: 0xffcc00, roughness: 0.3, metalness: 0.4 })
            );
            strip.rotation.x = -Math.PI / 2;
            strip.position.set(0, 0.02, 9);
            scene.add(strip);

            // Tracks area (Lowered)
            const tracksGeo = new THREE.PlaneGeometry(200, 30);
            const tracksMat = new THREE.MeshStandardMaterial({ color: 0x050505, roughness: 1 });
            const tracks = new THREE.Mesh(tracksGeo, tracksMat);
            tracks.rotation.x = -Math.PI / 2;
            tracks.position.set(0, -1.2, 25);
            scene.add(tracks);

            // Rails
            const railGeo = new THREE.BoxGeometry(200, 0.3, 0.5);
            const railMat = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 1, roughness: 0.2 });
            for(let zOffset of [16, 20, 30, 34]) {
                const rail = new THREE.Mesh(railGeo, railMat);
                rail.position.set(0, -1, zOffset);
                scene.add(rail);
            }

            // Back Wall (Tiled texture feel)
            const wallMat = new THREE.MeshStandardMaterial({ color: 0x2a2a2a, roughness: 0.4, metalness: 0.1 });
            const backWall = new THREE.Mesh(new THREE.BoxGeometry(200, 18, 2), wallMat);
            backWall.position.set(0, 8.5, -10);
            backWall.receiveShadow = true;
            scene.add(backWall);

            // Grout lines for wall
            for(let i=-100; i<=100; i+=10) {
                const line = new THREE.Mesh(new THREE.BoxGeometry(0.05, 18, 2.1), new THREE.MeshStandardMaterial({ color: 0x000000 }));
                line.position.set(i, 8.5, -10);
                scene.add(line);
            }

            // Pillars (Industrial Steel)
            const steelMat = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 1, roughness: 0.3 });
            for(let i=-80; i<=80; i+=40) {
                const pillar = new THREE.Mesh(new THREE.BoxGeometry(2.5, 12, 2.5), steelMat);
                pillar.position.set(i, 5.5, 6);
                pillar.castShadow = true;
                pillar.receiveShadow = true;
                scene.add(pillar);
            }

            // Ceiling with Pipes
            const ceiling = new THREE.Mesh(new THREE.PlaneGeometry(200, 60), new THREE.MeshStandardMaterial({ color: 0x080808 }));
            ceiling.rotation.x = Math.PI / 2;
            ceiling.position.set(0, 12, 10);
            scene.add(ceiling);

            // Copper/Steel Pipes
            for(let i=0; i<6; i++) {
                const pipe = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.3, 0.3, 200, 16),
                    new THREE.MeshStandardMaterial({ color: i % 2 === 0 ? 0x885533 : 0x222222, metalness: 1, roughness: 0.1 })
                );
                pipe.rotation.z = Math.PI / 2;
                pipe.position.set(0, 11, -8 + i * 4);
                scene.add(pipe);
            }

            // --- LIGHTING ---
            ambientLight = new THREE.AmbientLight(0xffffff, 0.15); // Good base light
            scene.add(ambientLight);

            // High-power Flickering Industrial Neons
            for(let i=-80; i<=80; i+=40) {
                const neonGroup = new THREE.Group();
                
                // Visual tube
                const tube = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.15, 0.15, 12, 8),
                    new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xffffff, emissiveIntensity: 10 })
                );
                tube.rotation.z = Math.PI / 2;
                neonGroup.add(tube);

                // Point Light
                const light = new THREE.PointLight(0xffffff, 600, 50, 2);
                light.position.y = -1;
                light.castShadow = true;
                light.shadow.bias = -0.005;
                neonGroup.add(light);

                neonGroup.position.set(i, 11.5, 2);
                scene.add(neonGroup);
                neons.push({ room: neonGroup, light, tube, baseInt: 600 });
            }

            // Billboard Ad Lights
            for(let i=-60; i<=60; i+=60) {
                const adColor = i === 0 ? 0x00ffcc : 0xff3300;
                
                // Better Billboard Texture
                const adCanvas = document.createElement('canvas');
                adCanvas.width = 512; adCanvas.height = 256;
                const adCtx = adCanvas.getContext('2d');
                adCtx.fillStyle = '#0a0a0a'; adCtx.fillRect(0,0,512,256);
                adCtx.strokeStyle = i === 0 ? '#00ffcc' : '#ff3300';
                adCtx.lineWidth = 15; adCtx.strokeRect(10,10,492,236);
                adCtx.fillStyle = adCtx.strokeStyle;
                adCtx.font = 'bold 80px Arial'; adCtx.textAlign = 'center';
                adCtx.fillText(i === 0 ? 'CYBER' : 'DANGER', 256, 120);
                adCtx.font = '20px monospace'; adCtx.fillText('SUBWAY NETWORK 402 - SECURE', 256, 185);
                
                const adTex = new THREE.CanvasTexture(adCanvas);
                const ad = new THREE.Mesh(
                    new THREE.BoxGeometry(12, 7, 0.6),
                    new THREE.MeshStandardMaterial({ map: adTex, emissiveMap: adTex, emissive: adColor, emissiveIntensity: 1.5 })
                );
                ad.position.set(i, 6, -9);
                scene.add(ad);

                const adLight = new THREE.PointLight(adColor, 150, 20);
                adLight.position.set(i, 6, -6);
                scene.add(adLight);
            }

            // PROPER VISIBLE BENCHES
            const benchSteel = new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.8, roughness: 0.2 });
            const benchWood = new THREE.MeshStandardMaterial({ color: 0xcc8855, roughness: 0.4 });
            
            for (let i = -100; i <= 100; i += 50) {
                if (Math.abs(i) % 100 === 0) continue;
                const bench = new THREE.Group();
                const legGeo = new THREE.BoxGeometry(0.3, 1.2, 2.5);
                const lLeg = new THREE.Mesh(legGeo, benchSteel); lLeg.position.set(-2.8, 0.6, 0);
                const rLeg = new THREE.Mesh(legGeo, benchSteel); rLeg.position.set(2.8, 0.6, 0);
                bench.add(lLeg); bench.add(rLeg);

                const seat = new THREE.Mesh(new THREE.BoxGeometry(6.5, 0.4, 3), benchWood);
                seat.position.y = 1.4;
                seat.castShadow = true;
                bench.add(seat);

                const back = new THREE.Mesh(new THREE.BoxGeometry(6.5, 1.8, 0.4), benchWood);
                back.position.set(0, 2.5, -1.3);
                back.castShadow = true;
                bench.add(back);

                bench.position.set(i, 0, -6);
                scene.add(bench);
            }

            // Station Clocks (Double-sided)
            for(let i=-80; i<=80; i+=160) {
                const clockGroup = new THREE.Group();
                const clockBody = new THREE.Mesh(new THREE.CylinderGeometry(1.2, 1.2, 0.6, 32), new THREE.MeshStandardMaterial({ color: 0x222222 }));
                clockBody.rotation.x = Math.PI / 2;
                clockGroup.add(clockBody);
                
                const face = new THREE.Mesh(new THREE.CircleGeometry(1, 32), new THREE.MeshStandardMaterial({ color: 0x000000, emissive: 0xff3300, emissiveIntensity: 2 }));
                face.position.z = 0.31;
                clockGroup.add(face);
                
                clockGroup.position.set(i + 20, 9, 6);
                scene.add(clockGroup);
                clocks.push(face);
            }

            // --- STATIC TRAIN ---
            const train = new THREE.Group();
            const carMat = new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 1, roughness: 0.2 });
            for(let i=0; i<3; i++) {
                const car = new THREE.Mesh(new THREE.BoxGeometry(50, 8, 7), carMat);
                car.position.set(i * 55 - 55, 4, 30);
                train.add(car);
                
                // Windows for train
                for(let w = -20; w <= 20; w += 8) {
                    const win = new THREE.Mesh(
                        new THREE.BoxGeometry(4, 2.5, 7.2),
                        new THREE.MeshStandardMaterial({ color: 0x000000, emissive: 0xffffff, emissiveIntensity: 0.3 })
                    );
                    win.position.set(i * 55 - 55 + w, 5.5, 30);
                    train.add(win);
                }
                
                // Add dirt/grime streaks (Visual hack)
                const dirt = new THREE.Mesh(new THREE.PlaneGeometry(50, 2), new THREE.MeshStandardMaterial({ color: 0x000000, transparent: true, opacity: 0.3 }));
                dirt.position.set(i * 55 - 55, 1, 33.51);
                train.add(dirt);
            }
            scene.add(train);

            // Dust Particles
            const dGeo = new THREE.BufferGeometry();
            const dPos = new Float32Array(5000 * 3);
            for(let i=0; i<5000*3; i+=3) {
                dPos[i] = Math.random()*200-100;
                dPos[i+1] = Math.random()*15;
                dPos[i+2] = Math.random()*40-10;
            }
            dGeo.setAttribute('position', new THREE.BufferAttribute(dPos, 3));
            const dMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.05, transparent: true, opacity: 0.15 });
            const dust = new THREE.Points(dGeo, dMat);
            scene.add(dust);
            
            // Scrolling LED Sign for delays
            const ledCanvas = document.createElement('canvas');
            ledCanvas.width = 1024; ledCanvas.height = 128;
            const ledCtx = ledCanvas.getContext('2d');
            const ledTex = new THREE.CanvasTexture(ledCanvas);
            const ledSignMesh = new THREE.Mesh(
                new THREE.BoxGeometry(10, 1.2, 0.4),
                new THREE.MeshStandardMaterial({ map: ledTex, emissiveMap: ledTex, emissive: 0xff3300, emissiveIntensity: 2 })
            );
            ledSignMesh.position.set(0, 10, 8.5);
            scene.add(ledSignMesh);
            ledSign = { canvas: ledCanvas, ctx: ledCtx, tex: ledTex, offset: 0 };

            // Trash Cans (Industrial cylindrical)
            const binMat = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.7, roughness: 0.2 });
            for(let i=-90; i<=90; i+=45) {
                if(i % 90 === 0) continue;
                const bin = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.6, 2, 16), binMat);
                bin.position.set(i + 5, 1, -8);
                scene.add(bin);
            }

            // Scattered Papers on the ground
            const paperMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 1.0, side: THREE.DoubleSide });
            for(let i=0; i<30; i++) {
                const paper = new THREE.Mesh(new THREE.PlaneGeometry(0.3, 0.4), paperMat);
                paper.rotation.x = -Math.PI / 2;
                paper.rotation.z = Math.random() * Math.PI;
                paper.position.set(Math.random()*160-80, 0.03, Math.random()*15-5);
                scene.add(paper);
            }

            // Far End Escalator Base (Atmospheric silhouette)
            const staircase = new THREE.Mesh(
                new THREE.BoxGeometry(15, 20, 30),
                new THREE.MeshStandardMaterial({ color: 0x050505 })
            );
            staircase.position.set(90, 5, -5);
            staircase.rotation.y = -0.2;
            scene.add(staircase);

            // Abandoned Luggage (Suitcases)
            const bagMat = new THREE.MeshStandardMaterial({ color: 0x331100, roughness: 0.8 });
            for(let i=0; i<8; i++) {
                const bag = new THREE.Group();
                const body = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1, 0.5), bagMat);
                bag.add(body);
                const handle = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.1, 0.1), new THREE.MeshStandardMaterial({ color: 0x000000 }));
                handle.position.y = 0.55;
                bag.add(handle);
                
                bag.position.set(Math.random()*160-80, 0.5, Math.random()*15-5);
                bag.rotation.y = Math.random() * Math.PI;
                scene.add(bag);
            }

            // Old Newspapers (Scattered planes)
            const newsMat = new THREE.MeshStandardMaterial({ color: 0xddddcc, roughness: 1.0, side: THREE.DoubleSide });
            for(let i=0; i<15; i++) {
                const paper = new THREE.Mesh(new THREE.PlaneGeometry(0.4, 0.6), newsMat);
                paper.rotation.x = -Math.PI / 2;
                paper.rotation.z = Math.random() * Math.PI;
                paper.position.set(Math.random()*180-90, 0.04, Math.random()*20-5);
                scene.add(paper);
            }

            // Emergency Fire Extinguisher Points
            for(let i=-100; i<=100; i+=100) {
                const extinguisher = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 1), new THREE.MeshStandardMaterial({ color: 0xaa0000, emissive: 0xaa0000, emissiveIntensity: 0.5 }));
                extinguisher.position.set(i + 5, 2.5, -9.5);
                scene.add(extinguisher);
            }

            // Security Cameras (Wall-mounted)
            for(let i=-180; i<=180; i+=60) {
                const camGroup = new THREE.Group();
                const mount = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 1), steelMat);
                camGroup.add(mount);
                const housing = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.4, 1.2), steelMat);
                housing.rotation.x = Math.PI / 2.5;
                housing.position.z = 0.8;
                camGroup.add(housing);
                const lens = new THREE.Mesh(new THREE.CircleGeometry(0.2, 16), new THREE.MeshStandardMaterial({ color: 0x000000, emissive: 0xff0000, emissiveIntensity: 2 }));
                lens.position.set(0, -0.4, 1.4);
                camGroup.add(lens);
                
                camGroup.position.set(i, 11, -8.8);
                scene.add(camGroup);
                cameras.push(lens);
            }

            // Graffiti (Procedural text decals)
            for(let i=0; i<10; i++) {
                const gCanvas = document.createElement('canvas');
                gCanvas.width = 256; gCanvas.height = 128;
                const gCtx = gCanvas.getContext('2d');
                const colors = ['#ff00ff', '#00ff00', '#ffff00', '#ff0000'];
                const color = colors[Math.floor(Math.random()*colors.length)];
                gCtx.font = 'bold 60px "Courier New"';
                gCtx.fillStyle = color;
                gCtx.shadowBlur = 10; gCtx.shadowColor = color;
                gCtx.fillText('VANDAL', 10, 80);
                
                const gTex = new THREE.CanvasTexture(gCanvas);
                const graffiti = new THREE.Mesh(new THREE.PlaneGeometry(6, 3), new THREE.MeshStandardMaterial({ map: gTex, transparent: true, opacity: 0.6, side: THREE.DoubleSide }));
                graffiti.position.set(Math.random()*180-90, 4 + Math.random()*4, -8.99);
                scene.add(graffiti);
            }

            // (Removed yellow signs to avoid visual confusion)

            // Vending Machines (Cyber-glow)
            for(let i=-60; i<=60; i+=120) {
                const machineGroup = new THREE.Group();
                const body = new THREE.Mesh(new THREE.BoxGeometry(4, 8.5, 3), new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.8, roughness: 0.2 }));
                machineGroup.add(body);
                
                // Glowing panel
                const panel = new THREE.Mesh(new THREE.PlaneGeometry(3, 7.5), new THREE.MeshStandardMaterial({ color: 0x000000, emissive: 0x00ffcc, emissiveIntensity: 2 }));
                panel.position.set(0, 0, 1.51);
                machineGroup.add(panel);

                const light = new THREE.PointLight(0x00ffcc, 100, 10);
                light.position.set(0, 0, 3);
                machineGroup.add(light);

                machineGroup.position.set(i + 20, 4.25, -8.5);
                scene.add(machineGroup);
                vendingMachines.push({ panel, light, phase: Math.random() * Math.PI });
            }

            // Staff Only Doors
            const doorMat = new THREE.MeshStandardMaterial({ color: 0x0a0a0a, metalness: 0.9, roughness: 0.5 });
            for(let i=-130; i<=130; i+=260) {
                const door = new THREE.Mesh(new THREE.BoxGeometry(4, 9, 0.2), doorMat);
                door.position.set(i, 4.5, -9.9);
                scene.add(door);
                
                // Red keypad light
                const keypad = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.5, 0.1), new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0xff0000, emissiveIntensity: 5 }));
                keypad.position.set(i + 1.5, 5, -9.8);
                scene.add(keypad);
            }

            // Industrial Wiring Hangars
            for(let i=-180; i<=180; i+=20) {
                const cableGroup = new THREE.Group();
                for(let c=0; c<3; c++) {
                    const curve = new THREE.CubicBezierCurve3(
                        new THREE.Vector3(-10, 11 + c*0.2, 0),
                        new THREE.Vector3(-5, 9 + c*0.2, 2),
                        new THREE.Vector3(5, 9 + c*0.2, -2),
                        new THREE.Vector3(10, 11 + c*0.2, 0)
                    );
                    const points = curve.getPoints(20);
                    const geometry = new THREE.BufferGeometry().setFromPoints(points);
                    const line = new THREE.Line(geometry, new THREE.LineBasicMaterial({ color: 0x000000 }));
                    cableGroup.add(line);
                }
                cableGroup.position.set(i, 0, 0);
                scene.add(cableGroup);
            }

            // --- UI LOGIC ---
            const exposureSlider = document.getElementById('exposure');
            exposureSlider.addEventListener('input', (e) => {
                e.stopImmediatePropagation();
                const val = parseFloat(e.target.value);
                renderer.toneMappingExposure = val;
                ambientLight.intensity = 0.15 * (val / 2.0);
            });

            window.addEventListener('resize', onWindowResize, false);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now() * 0.001;

            // Subtle flickering
            neons.forEach(n => {
                if(Math.random() > 0.99) {
                    n.light.intensity = n.baseInt * 0.2;
                    n.tube.material.emissiveIntensity = 2;
                    setTimeout(() => {
                        n.light.intensity = n.baseInt;
                        n.tube.material.emissiveIntensity = 10;
                    }, 50 + Math.random() * 100);
                }
            });
            
            // Animate clock pulse
            clocks.forEach(face => {
                const pulse = (Math.sin(time * 2) + 1) * 0.5;
                face.material.emissiveIntensity = 3 + pulse * 8;
            });

            // Animate Camera Lenses
            cameras.forEach(lens => {
                lens.material.emissiveIntensity = 1 + (Math.sin(time * 3) + 1) * 2;
            });
            
            // Animate Vending Machines
            vendingMachines.forEach(v => {
                const p = (Math.sin(time * 0.5 + v.phase) + 1) * 0.5;
                v.panel.material.emissiveIntensity = 1 + p * 3;
                v.light.intensity = 50 + p * 100;
            });
            
            // Animate LED Sign
            if(ledSign) {
                ledSign.offset -= 3;
                if(ledSign.offset < -2000) ledSign.offset = 1024;
                ledSign.ctx.fillStyle = '#000';
                ledSign.ctx.fillRect(0,0,1024,128);
                ledSign.ctx.fillStyle = '#ff3300';
                ledSign.ctx.font = 'bold 70px Courier New';
                ledSign.ctx.fillText('STATION 402 - DELAYED - CHECK NETWORK STATUS - TRACKS CLEAR - ', ledSign.offset, 90);
                ledSign.tex.needsUpdate = true;
            }
            
            // Tweak fog based on exposure for depth
            scene.fog.density = 0.02 * (1.5 / renderer.toneMappingExposure);

            controls.update();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
