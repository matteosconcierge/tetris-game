<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Station 402 - Tactical FPS</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; }

        #crosshair {
            position: absolute;
            top: 50%; left: 50%;
            width: 24px; height: 24px;
            border: 2px solid rgba(0, 255, 255, 0.4);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 100;
        }
        #crosshair::before, #crosshair::after {
            content: ''; position: absolute; background: cyan;
        }
        #crosshair::before { width: 1px; height: 100%; left: 50%; top: 0; }
        #crosshair::after { height: 1px; width: 100%; top: 50%; left: 0; }

        #stats-hud {
            position: absolute;
            bottom: 50px;
            left: 50px;
            color: cyan;
            font-family: 'Courier New', Courier, monospace;
            font-size: 24px;
            text-shadow: 0 0 15px rgba(0, 255, 255, 0.8);
            pointer-events: none;
            z-index: 100;
            background: rgba(0,0,0,0.5);
            padding: 15px 25px;
            border-left: 5px solid cyan;
            clip-path: polygon(0 0, 100% 0, 90% 100%, 0 100%);
        }

        #blocker {
            position: absolute;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
            color: #fff;
            cursor: pointer;
            text-align: center;
            backdrop-filter: blur(10px);
        }
        .msg { font-size: 32px; letter-spacing: 10px; text-transform: uppercase; font-weight: 100; color: cyan; }
        .sub-msg { font-size: 14px; color: #888; margin-top: 20px; letter-spacing: 4px; }

        #vignette {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 30%, rgba(0,0,0,0.9) 150%);
            pointer-events: none;
            z-index: 10;
        }

        #clock-ui {
            position: absolute;
            top: 40px;
            right: 40px;
            color: #ff3300;
            font-family: monospace;
            font-size: 28px;
            pointer-events: none;
            opacity: 0.7;
        }

        #lighting-ctrl {
            position: absolute;
            top: 40px;
            left: 40px;
            z-index: 300;
            color: cyan;
            font-family: 'Courier New', Courier, monospace;
            background: rgba(0, 255, 255, 0.1);
            padding: 10px 20px;
            border-left: 3px solid cyan;
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        #lighting-ctrl input {
            cursor: pointer;
            width: 150px;
        }
        #lighting-ctrl label {
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Mobile Controls */
        #mobile-controls {
            display: none;
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 150;
        }
        .joystick-container {
            position: absolute;
            bottom: 40px; left: 40px;
            width: 140px; height: 140px;
            background: rgba(0, 255, 255, 0.05);
            border: 2px solid rgba(0, 255, 255, 0.3);
            border-radius: 50%;
            pointer-events: auto;
            touch-action: none;
        }
        .joystick-knob {
            position: absolute;
            top: 50%; left: 50%;
            width: 60px; height: 60px;
            transform: translate(-50%, -50%);
            background: cyan;
            border-radius: 50%;
            box-shadow: 0 0 20px cyan;
            opacity: 0.6;
        }
        #fire-button {
            position: absolute;
            bottom: 60px; right: 60px;
            width: 110px; height: 110px;
            background: rgba(0, 255, 255, 0.1);
            border: 4px solid cyan;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: cyan;
            font-weight: bold;
            font-size: 20px;
            font-family: 'Courier New', Courier, monospace;
            pointer-events: auto;
            user-select: none;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.4);
            touch-action: none;
            text-shadow: 0 0 10px cyan;
        }
        #look-area {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: auto;
            touch-action: none;
        }
    </style>
</head>
<body>
    <div id="blocker">
        <div>
            <div class="msg">STATION 402 // COMBAT ADAPTATION</div>
            <div class="sub-msg">CLICK TO INITIALIZE FPS INTERFACE<br>(WASD: MOVE | SPACE: JUMP | MOUSE: AIM | CLICK: FIRE)</div>
        </div>
    </div>

    <div id="mobile-controls">
        <div id="look-area"></div>
        <div class="joystick-container">
            <div class="joystick-knob"></div>
        </div>
        <div id="fire-button">FIRE</div>
    </div>

    <div id="crosshair"></div>
    <div id="lighting-ctrl">
        <label>Exposure</label>
        <input type="range" id="exposure-range" min="0.1" max="3" step="0.1" value="2.0">
    </div>
    <div id="stats-hud">
        DECOMMISSIONED: <span id="kills-val">0</span> | VITALITY: <span id="health-val">100</span>%
    </div>
    <div id="clock-ui">00:00:00</div>
    <div id="vignette"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "three/examples/jsm/postprocessing/": "https://unpkg.com/three@0.160.0/examples/jsm/postprocessing/",
                "three/examples/jsm/shaders/": "https://unpkg.com/three@0.160.0/examples/jsm/shaders/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
        import { EffectComposer } from 'three/examples/jsm/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/examples/jsm/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/examples/jsm/postprocessing/UnrealBloomPass.js';

        let scene, camera, renderer, controls, composer, bloomPass, audioCtx;
        let mainLights = [], adScreens = [], fans = [], drones = [], particles = [], collidables = [], enemyProjectiles = [];
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false, canJump = false;
        let velocity = new THREE.Vector3(), direction = new THREE.Vector3();
        let kills = 0, health = 100, gun, muzzleFlash, dripArray, ledData;
        const clock = new THREE.Clock();

        const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

        init();
        animate();

        function playShotSound() {
            if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        function playExplodeSound() {
            if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const bufferSize = audioCtx.sampleRate * 0.2;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            noise.connect(gain);
            gain.connect(audioCtx.destination);
            noise.start();
        }

        function playDamageSound() {
            if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(100, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(40, audioCtx.currentTime + 0.2);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.2);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.2);
        }

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000205);
            scene.fog = new THREE.FogExp2(0x000205, 0.035);

            camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.toneMapping = THREE.ReinhardToneMapping;
            renderer.toneMappingExposure = 2.0;
            document.body.appendChild(renderer.domElement);

            // Post-Processing
            const renderScene = new RenderPass(scene, camera);
            bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
            bloomPass.threshold = 0.2;
            bloomPass.strength = 1.4;
            bloomPass.radius = 0.8;

            composer = new EffectComposer(renderer);
            composer.addPass(renderScene);
            composer.addPass(bloomPass);

            // Controls
            controls = new PointerLockControls(camera, document.body);
            const blocker = document.getElementById('blocker');
            const mobileControls = document.getElementById('mobile-controls');
            const subMsg = blocker.querySelector('.sub-msg');

            if (isTouchDevice) {
                subMsg.innerHTML = "TAP TO INITIALIZE FPS INTERFACE<br>(JOYSTICK: MOVE | SWIPE: LOOK | 'FIRE' BUTTON)";
                blocker.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    blocker.style.display = 'none';
                    mobileControls.style.display = 'block';
                    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                });
            } else {
                blocker.addEventListener('click', () => controls.lock());
                controls.addEventListener('lock', () => {
                    blocker.style.display = 'none';
                });
                controls.addEventListener('unlock', () => {
                    blocker.style.display = 'flex';
                });
            }

            scene.add(controls.getObject());
            controls.getObject().position.set(-20, 4, 30);

            // Input
            // Slider listener
            const exposureSlider = document.getElementById('exposure-range');
            exposureSlider.addEventListener('input', (e) => {
                renderer.toneMappingExposure = parseFloat(e.target.value);
            });

            if (isTouchDevice) {
                initTouchControls();
            }

            const onKeyDown = (e) => {
                switch(e.code) {
                    case 'KeyW': moveForward = true; break;
                    case 'KeyS': moveBackward = true; break;
                    case 'KeyA': moveLeft = true; break;
                    case 'KeyD': moveRight = true; break;
                    case 'Space': if(canJump) velocity.y += 180; canJump = false; break;
                }
            };
            const onKeyUp = (e) => {
                switch(e.code) {
                    case 'KeyW': moveForward = false; break;
                    case 'KeyS': moveBackward = false; break;
                    case 'KeyA': moveLeft = false; break;
                    case 'KeyD': moveRight = false; break;
                }
            };
            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);
            window.addEventListener('mousedown', () => { 
                if(controls.isLocked || (isTouchDevice && blocker.style.display === 'none')) {
                    if (!isTouchDevice) shoot(); 
                }
            });

            // --- WORLD BUILDING ---

            // Floor
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x050505, roughness: 0.05, metalness: 0.95 });
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(400, 100), floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);

            // Walls & Pillars (Collidables)
            const wallMat = new THREE.MeshStandardMaterial({ color: 0x0a0a0a, roughness: 0.8 });
            const backWall = new THREE.Mesh(new THREE.BoxGeometry(400, 20, 5), wallMat);
            backWall.position.set(0, 10, -15);
            scene.add(backWall);
            collidables.push(backWall);

            for (let i = -150; i <= 150; i += 40) {
                const pillar = new THREE.Mesh(new THREE.BoxGeometry(3, 20, 3), wallMat);
                pillar.position.set(i, 10, 5);
                scene.add(pillar);
                collidables.push(pillar);
            }

            // Ceiling & Subsystem
            const ceiling = new THREE.Mesh(new THREE.PlaneGeometry(400, 100), new THREE.MeshStandardMaterial({ color: 0x020202 }));
            ceiling.rotation.x = Math.PI / 2;
            ceiling.position.y = 20;
            scene.add(ceiling);

            // Fans
            for (let i = -120; i <= 120; i += 60) {
                const fanGroup = new THREE.Group();
                for(let b=0; b<4; b++) {
                    const blade = new THREE.Mesh(new THREE.BoxGeometry(6, 0.1, 1), wallMat);
                    blade.rotation.y = (b * Math.PI) / 2;
                    fanGroup.add(blade);
                }
                fanGroup.position.set(i, 19, 0);
                scene.add(fanGroup);
                fans.push(fanGroup);
            }

            // Billboards
            for (let i = -100; i <= 100; i += 50) {
                const color = i % 100 === 0 ? 0x00ffff : 0xff3300;
                const canvas = document.createElement('canvas');
                canvas.width = 512; canvas.height = 256;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#000'; ctx.fillRect(0,0,512,256);
                ctx.strokeStyle = i % 100 === 0 ? '#00ffff' : '#ff3300';
                ctx.lineWidth = 20; ctx.strokeRect(0,0,512,256);
                ctx.font = 'bold 120px Arial'; ctx.fillStyle = ctx.strokeStyle; ctx.textAlign = 'center';
                ctx.fillText(i % 100 === 0 ? 'ACTIVE' : 'WATCH', 256, 160);
                
                const tex = new THREE.CanvasTexture(canvas);
                const ad = new THREE.Mesh(new THREE.BoxGeometry(15, 8, 0.5), new THREE.MeshStandardMaterial({ map: tex, emissiveMap: tex, emissive: color, emissiveIntensity: 2 }));
                ad.position.set(i, 8, -12.4);
                scene.add(ad);
                adScreens.push({ mesh: ad, phase: Math.random()*Math.PI });
            }

            // --- ARMORY ---
            gun = new THREE.Group();
            const gBody = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.8, 4), new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 1 }));
            gun.add(gBody);
            const gBarrel = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 3), new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x00ffff, emissiveIntensity: 2 }));
            gBarrel.rotation.x = Math.PI/2; gBarrel.position.z = -2;
            gun.add(gBarrel);
            
            muzzleFlash = new THREE.PointLight(0x00ffff, 0, 15);
            muzzleFlash.position.z = -4;
            gun.add(muzzleFlash);
            
            camera.add(gun);
            gun.position.set(1, -1.2, -2.5);

            // --- ADVERSARIES ---
            for(let i=0; i<6; i++) spawnDrone();

            // Industry Particles
            const dGeo = new THREE.BufferGeometry();
            const dPos = [];
            for(let i=0; i<4000; i++) dPos.push(Math.random()*400-200, Math.random()*20, Math.random()*60-30);
            dGeo.setAttribute('position', new THREE.Float32BufferAttribute(dPos, 3));
            scene.add(new THREE.Points(dGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.05, transparent: true, opacity: 0.1 })));

            // Lights
            scene.add(new THREE.AmbientLight(0xffffff, 0.1));
            for(let i=-120; i<=120; i+=60) {
                const pl = new THREE.PointLight(0xffffff, 100, 80);
                pl.position.set(i, 18, -5);
                scene.add(pl);
            }

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
                composer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        function initTouchControls() {
            const joystick = document.querySelector('.joystick-container');
            const knob = document.querySelector('.joystick-knob');
            const fireBtn = document.getElementById('fire-button');
            const lookArea = document.getElementById('look-area');
            
            let joyActive = false;
            let joyTouchId = null;
            let lookTouchId = null;
            let lastLookX, lastLookY;

            joystick.addEventListener('touchstart', (e) => {
                joyActive = true;
                joyTouchId = e.changedTouches[0].identifier;
            }, { passive: false });

            fireBtn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                shoot();
            }, { passive: false });

            lookArea.addEventListener('touchstart', (e) => {
                if (e.target.closest('#lighting-ctrl')) return;
                if (lookTouchId !== null) return;
                lookTouchId = e.changedTouches[0].identifier;
                lastLookX = e.changedTouches[0].pageX;
                lastLookY = e.changedTouches[0].pageY;
            });

            window.addEventListener('touchmove', (e) => {
                for (let t of e.changedTouches) {
                    if (joyActive && t.identifier === joyTouchId) {
                        const rect = joystick.getBoundingClientRect();
                        const centerX = rect.left + rect.width / 2;
                        const centerY = rect.top + rect.height / 2;
                        
                        let dx = t.pageX - centerX;
                        let dy = t.pageY - centerY;
                        const distance = Math.sqrt(dx*dx + dy*dy);
                        const maxRadius = rect.width / 2;

                        if (distance > maxRadius) {
                            dx *= maxRadius / distance;
                            dy *= maxRadius / distance;
                        }

                        knob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                        
                        const normX = dx / maxRadius;
                        const normY = dy / maxRadius;
                        
                        moveForward = normY < -0.2;
                        moveBackward = normY > 0.2;
                        moveLeft = normX < -0.2;
                        moveRight = normX > 0.2;
                    }

                    if (t.identifier === lookTouchId) {
                        const dx = t.pageX - lastLookX;
                        const dy = t.pageY - lastLookY;
                        lastLookX = t.pageX;
                        lastLookY = t.pageY;

                        const sensitivity = 0.005;
                        const yawObject = controls.getObject();
                        const pitchObject = camera;

                        yawObject.rotation.y -= dx * sensitivity;
                        pitchObject.rotation.x -= dy * sensitivity;
                        pitchObject.rotation.x = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, pitchObject.rotation.x));
                    }
                }
            }, { passive: false });

            window.addEventListener('touchend', (e) => {
                for (let t of e.changedTouches) {
                    if (t.identifier === joyTouchId) {
                        joyActive = false;
                        joyTouchId = null;
                        knob.style.transform = `translate(-50%, -50%)`;
                        moveForward = moveBackward = moveLeft = moveRight = false;
                    }
                    if (t.identifier === lookTouchId) {
                        lookTouchId = null;
                    }
                }
            });
        }

        function droneShoot(drone) {
            const geo = new THREE.SphereGeometry(0.2);
            const mat = new THREE.MeshBasicMaterial({ color: 0xff3300 });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.copy(drone.position);
            
            const vel = new THREE.Vector3().subVectors(camera.position, drone.position).normalize().multiplyScalar(0.8);
            enemyProjectiles.push({ mesh, vel });
            scene.add(mesh);
        }

        function takeDamage(amt) {
            playDamageSound();
            health -= amt;
            if(health < 0) health = 0;
            document.getElementById('health-val').innerText = health;
            
            // Visual feedback
            renderer.setClearColor(0xff0000, 0.2);
            setTimeout(() => renderer.setClearColor(0x000205, 1), 50);

            if(health <= 0) gameOver();
        }

        function gameOver() {
            controls.unlock();
            const msg = document.querySelector('.msg');
            msg.innerHTML = "SYSTEM COMPROMISED";
            msg.style.color = "#ff3300";
            document.querySelector('.sub-msg').innerHTML = `DRONES OVERRAN THE STATION.<br>${isTouchDevice ? 'TAP' : 'CLICK'} TO REBOOT`;
            document.getElementById('mobile-controls').style.display = 'none';
            
            // Reset state
            health = 100;
            kills = 0;
            document.getElementById('health-val').innerText = health;
            document.getElementById('kills-val').innerText = kills;
            enemyProjectiles.forEach(p => scene.remove(p.mesh));
            enemyProjectiles = [];
        }

        function spawnDrone() {
            const drone = new THREE.Group();
            drone.userData.isDrone = true;
            const body = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.5, 1.5), new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 1 }));
            drone.add(body);
            const eye = new THREE.Mesh(new THREE.SphereGeometry(0.4), new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0xff0000, emissiveIntensity: 5 }));
            eye.position.z = 0.8;
            drone.add(eye);
            
            drone.position.set(Math.random()*200-100, 4 + Math.random()*10, Math.random()*40-20);
            scene.add(drone);
            drones.push({ mesh: drone, noise: Math.random()*Math.PI*2 });
        }

        function shoot() {
            playShotSound();
            muzzleFlash.intensity = 150;
            setTimeout(() => muzzleFlash.intensity = 0, 50);
            
            // Recoil
            gun.position.z += 0.5;
            
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
            const intersects = raycaster.intersectObjects(scene.children, true);
            
            if(intersects.length > 0) {
                let hit = intersects[0];
                let obj = hit.object;
                while(obj.parent && !obj.userData.isDrone) obj = obj.parent;
                
                if(obj.userData.isDrone) {
                    const idx = drones.findIndex(d => d.mesh === obj);
                    if(idx !== -1) {
                        explode(obj.position);
                        scene.remove(obj);
                        drones.splice(idx, 1);
                        kills++;
                        document.getElementById('kills-val').innerText = kills;
                        setTimeout(spawnDrone, 1500);
                    }
                } else {
                    // Impact
                    const spk = new THREE.Mesh(new THREE.SphereGeometry(0.15), new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x00ffff, emissiveIntensity: 10 }));
                    spk.position.copy(hit.point);
                    scene.add(spk);
                    setTimeout(() => scene.remove(spk), 150);
                }
            }
        }

        function explode(pos) {
            playExplodeSound();
            for(let i=0; i<15; i++) {
                const p = new THREE.Mesh(new THREE.SphereGeometry(0.12), new THREE.MeshStandardMaterial({ color: 0xff4400, emissive: 0xffaa00, emissiveIntensity: 5 }));
                p.position.copy(pos);
                particles.push({ mesh: p, vel: new THREE.Vector3(Math.random()-0.5, Math.random()-0.5, Math.random()-0.5).multiplyScalar(0.4), life: 1.0 });
                scene.add(p);
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();
            const blocker = document.getElementById('blocker');

            if ((controls.isLocked || (isTouchDevice && blocker.style.display === 'none')) && health > 0) {
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;
                velocity.y -= 9.8 * 80.0 * delta; // Heavy Gravity

                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize();

                if (moveForward || moveBackward) velocity.z -= direction.z * 400.0 * delta;
                if (moveLeft || moveRight) velocity.x -= direction.x * 400.0 * delta;

                // COLLISION DETECTION (Simple)
                const prevPos = controls.getObject().position.clone();
                
                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);
                
                let playerPos = controls.getObject().position;
                let hitObject = false;
                
                collidables.forEach(c => {
                    const bounds = new THREE.Box3().setFromObject(c);
                    const playerBox = new THREE.Box3().setFromCenterAndSize(
                        new THREE.Vector3(playerPos.x, 10, playerPos.z), 
                        new THREE.Vector3(2, 20, 2)
                    );
                    if(bounds.intersectsBox(playerBox)) hitObject = true;
                });
                
                if(hitObject) {
                    controls.getObject().position.copy(prevPos);
                    velocity.x = 0;
                    velocity.z = 0;
                }
                
                controls.getObject().position.y += (velocity.y * delta);
                if (controls.getObject().position.y < 4) {
                    velocity.y = 0;
                    controls.getObject().position.y = 4;
                    canJump = true;
                }

                // Smooth recoil recovery
                gun.position.z += ( -2.5 - gun.position.z ) * 0.1;
                gun.position.y = -1.2 + Math.sin(time*4) * 0.01 * (velocity.length()/50);
            }

            // Animate Assets
            fans.forEach(f => f.rotation.y += 0.1);
            drones.forEach(d => {
                d.mesh.position.y += Math.sin(time * 2 + d.noise) * 0.02;
                d.mesh.lookAt(camera.position);
                
                // Random shooting
                if(Math.random() < 0.005) droneShoot(d.mesh);
            });
            
            // Projectiles
            enemyProjectiles.forEach((p, i) => {
                p.mesh.position.add(p.vel);
                if(p.mesh.position.distanceTo(camera.position) < 2) {
                    takeDamage(10);
                    scene.remove(p.mesh);
                    enemyProjectiles.splice(i, 1);
                }
                if(p.mesh.position.length() > 500) {
                    scene.remove(p.mesh);
                    enemyProjectiles.splice(i, 1);
                }
            });

            adScreens.forEach(ad => {
                ad.mesh.material.emissiveIntensity = 1.0 + Math.sin(time * 0.8 + ad.phase) * 0.5;
            });
            particles.forEach((p, i) => {
                p.mesh.position.add(p.vel);
                p.life -= 0.02;
                p.mesh.scale.setScalar(p.life);
                if(p.life <= 0) {
                    scene.remove(p.mesh);
                    particles.splice(i, 1);
                }
            });

            const d = new Date();
            document.getElementById('clock-ui').innerText = d.toLocaleTimeString();

            composer.render();
        }
    </script>
</body>
</html>
