<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Underground Echoes - Subway Scene</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; }
        
        #ui-container {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20, 20, 20, 0.8);
            padding: 20px 30px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            user-select: none;
            touch-action: none;
        }

        .label { color: #fff; text-transform: uppercase; letter-spacing: 2px; font-size: 12px; font-weight: bold; }
        
        input[type=range] {
            -webkit-appearance: none;
            width: 200px;
            height: 4px;
            background: #444;
            outline: none;
            border-radius: 2px;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: #fff;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
            transition: 0.2s;
        }

        input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); }

        #instructions {
            position: absolute;
            top: 20px;
            left: 20px;
            color: rgba(255,255,255,0.4);
            font-size: 12px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="instructions">DRAG TO ORBIT • PINCH TO ZOOM • SLIDER FOR BRIGHTNESS</div>
    <div id="ui-container">
        <span class="label">Atmosphere</span>
        <input type="range" id="brightness" min="0" max="2" step="0.01" value="1">
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, controls;
        let mainLights = [];
        let ambientLight;

        init();
        animate();

        function init() {
            // Scene & Setup
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);
            scene.fog = new THREE.FogExp2(0x050505, 0.015);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(-15, 2, 20);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.maxPolarAngle = Math.PI / 2 + 0.1;
            controls.minDistance = 5;
            controls.maxDistance = 50;
            controls.target.set(0, 2, 0);

            // --- STATION GEOMETRY ---

            const textureLoader = new THREE.TextureLoader();
            
            // Platform
            const platformGeo = new THREE.BoxGeometry(100, 1, 20);
            const platformMat = new THREE.MeshStandardMaterial({ 
                color: 0x444444, 
                roughness: 0.8,
                metalness: 0.2
            });
            const platform = new THREE.Mesh(platformGeo, platformMat);
            platform.position.y = -0.5;
            platform.receiveShadow = true;
            scene.add(platform);

            // Warning Strip
            const stripGeo = new THREE.PlaneGeometry(100, 1.2);
            const stripMat = new THREE.MeshStandardMaterial({ color: 0xffcc00, roughness: 0.5 });
            const strip = new THREE.Mesh(stripGeo, stripMat);
            strip.rotation.x = -Math.PI / 2;
            strip.position.set(0, 0.01, 8);
            scene.add(strip);

            // Walls (Tiled)
            const wallGeo = new THREE.BoxGeometry(100, 15, 1);
            const wallMat = new THREE.MeshStandardMaterial({ color: 0xeeeeee, roughness: 0.3 });
            const backWall = new THREE.Mesh(wallGeo, wallMat);
            backWall.position.set(0, 7.5, -10);
            backWall.receiveShadow = true;
            scene.add(backWall);

            // Pillars
            for (let i = -40; i <= 40; i += 20) {
                const pillarGeo = new THREE.BoxGeometry(2, 10, 2);
                const pillarMat = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.8, roughness: 0.2 });
                const pillar = new THREE.Mesh(pillarGeo, pillarMat);
                pillar.position.set(i, 5, 5);
                pillar.castShadow = true;
                pillar.receiveShadow = true;
                scene.add(pillar);
            }

            // Tracks area
            const trackFloorGeo = new THREE.BoxGeometry(100, 1, 15);
            const trackFloorMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 1 });
            const trackFloor = new THREE.Mesh(trackFloorGeo, trackFloorMat);
            trackFloor.position.set(0, -1.5, 20);
            scene.add(trackFloor);

            // Rails
            const railGeo = new THREE.BoxGeometry(100, 0.2, 0.4);
            const railMat = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 1, roughness: 0.3 });
            
            const rail1 = new THREE.Mesh(railGeo, railMat);
            rail1.position.set(0, -1, 14);
            scene.add(rail1);
            
            const rail2 = new THREE.Mesh(railGeo, railMat);
            rail2.position.set(0, -1, 17);
            scene.add(rail2);

            // Ceiling
            const ceilingGeo = new THREE.BoxGeometry(100, 1, 40);
            const ceilingMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
            const ceiling = new THREE.Mesh(ceilingGeo, ceilingMat);
            ceiling.position.set(0, 10, 10);
            scene.add(ceiling);

            // --- SUBWAY TRAIN ---
            const trainGroup = new THREE.Group();
            const trainBodyGeo = new THREE.BoxGeometry(80, 7, 6);
            const trainBodyMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, metalness: 0.9, roughness: 0.1 });
            const trainBody = new THREE.Mesh(trainBodyGeo, trainBodyMat);
            trainBody.position.set(0, 2.5, 15.5);
            trainBody.castShadow = true;
            trainGroup.add(trainBody);

            // Windows
            for (let i = -35; i <= 35; i += 8) {
                const winGeo = new THREE.BoxGeometry(4, 2.5, 6.2);
                const winMat = new THREE.MeshStandardMaterial({ 
                    color: 0x000000, 
                    emissive: 0xffffff, 
                    emissiveIntensity: 0.5 
                });
                const window = new THREE.Mesh(winGeo, winMat);
                window.position.set(i, 3.5, 15.5);
                trainGroup.add(window);
            }
            scene.add(trainGroup);

            // --- LIGHTING ---
            ambientLight = new THREE.AmbientLight(0xffffff, 0.05);
            scene.add(ambientLight);

            // Fluorescent Tube Lights
            for (let i = -40; i <= 40; i += 20) {
                // Light Mesh
                const tubeGeo = new THREE.CylinderGeometry(0.2, 0.2, 8, 8);
                const tubeMat = new THREE.MeshStandardMaterial({ 
                    color: 0xffffff, 
                    emissive: 0xffffff, 
                    emissiveIntensity: 2 
                });
                const tube = new THREE.Mesh(tubeGeo, tubeMat);
                tube.rotation.z = Math.PI / 2;
                tube.position.set(i, 9.4, -2);
                scene.add(tube);

                // Actual Point Light
                const pLight = new THREE.PointLight(0xffffff, 50, 40);
                pLight.position.set(i, 9, -2);
                pLight.castShadow = true;
                pLight.shadow.bias = -0.005;
                scene.add(pLight);
                mainLights.push(pLight);
            }

            // Emissive Signs
            const signGeo = new THREE.BoxGeometry(4, 2, 0.5);
            const signMat = new THREE.MeshStandardMaterial({ 
                color: 0x222222, 
                emissive: 0x00ff00, 
                emissiveIntensity: 1 
            });
            const exitSign = new THREE.Mesh(signGeo, signMat);
            exitSign.position.set(0, 8, -9.5);
            scene.add(exitSign);

            // UI Interaction
            const brightnessSlider = document.getElementById('brightness');
            brightnessSlider.addEventListener('input', (e) => {
                const val = parseFloat(e.target.value);
                ambientLight.intensity = 0.05 * val;
                mainLights.forEach(light => {
                    light.intensity = 50 * val;
                });
                // Update emissive intensity too
                scene.traverse((child) => {
                    if (child.isMesh && child.material.emissive) {
                        if (child.material.emissive.getHex() === 0xffffff) {
                             child.material.emissiveIntensity = 2 * val;
                        } else {
                             child.material.emissiveIntensity = 1 * val;
                        }
                    }
                });
            });

            window.addEventListener('resize', onWindowResize, false);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
