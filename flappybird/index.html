<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Flappy Bird</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #4ec0ca;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        canvas {
            background: #70c5ce;
            border: 4px solid #fff;
            border-radius: 10px;
            max-width: 100%;
            max-height: 80vh;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        #score {
            color: white;
            font-size: 48px;
            font-weight: bold;
            text-shadow: 2px 2px #000;
            margin-bottom: 20px;
        }
        .back-btn {
            margin-top: 20px;
            padding: 10px 20px;
            background: #f7941d;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            box-shadow: 0 4px #d47a12;
        }
        .back-btn:active {
            box-shadow: 0 2px #d47a12;
            transform: translateY(2px);
        }
    </style>
</head>
<body>
    <div id="score">0</div>
    <canvas id="flappy" width="320" height="480"></canvas>
    <a href="../index.html" class="back-btn">Back to Arcade</a>
    <script src="script.js"></script>
</body>
</html>
