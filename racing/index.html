<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Velocity Pro - Circuit Racing</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-container">
        <!-- HUD when racing -->
        <div id="hud" class="hidden">
            <div class="hud-top">
                <div id="position-display">1st / 4</div>
                <div id="lap-display">LAP 1/3</div>
            </div>
            
            <div class="hud-bottom">
                <div class="speed-container">
                    <div id="speed-value">0</div>
                    <div class="unit">KM/H</div>
                </div>
                <div class="leaderboard-mini" id="leaderboard-mini">
                    <!-- Dynamic leaderboard -->
                </div>
            </div>
        </div>

        <!-- Overlays -->
        <div id="ui-overlay">
            <div id="start-screen" class="overlay-panel">
                <h1 class="logo">VELOCITY <span>PRO</span></h1>
                <p class="subtitle">Circuit de la Web</p>
                
                <div class="instructions">
                    <p>WASD or Arrows to Drive</p>
                    <p>Space for Handbrake</p>
                    <p>Shift for Camera Change</p>
                </div>

                <button id="start-button">START RACE</button>
            </div>

            <div id="game-over-screen" class="overlay-panel hidden">
                <h1 id="result-title">RACE FINISHED</h1>
                <div id="final-results">
                    <!-- Results list -->
                </div>
                <button id="restart-button">RETRY</button>
            </div>
        </div>

        <div id="mobile-controls" class="hidden">
            <div class="touch-left">
                <div id="btn-left" class="touch-btn">L</div>
                <div id="btn-right" class="touch-btn">R</div>
            </div>
            <div class="touch-right">
                <div id="btn-accel" class="touch-btn">GO</div>
                <div id="btn-brake" class="touch-btn">STP</div>
            </div>
        </div>
    </div>

    <!-- Three.js Import Map -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module">
        import { init } from './script.js';
        function showLog(msg) {
            const div = document.createElement('div');
            div.style.cssText = "position:fixed;top:10px;left:10px;z-index:10000;background:red;color:white;padding:5px;";
            div.innerText = msg;
            document.body.appendChild(div);
        }
        window.onerror = (e) => showLog("Err: " + e);
        try {
            init();
        } catch (e) {
            showLog("Init Err: " + e.message);
        }
    </script>
</body>
</html>
