    bio:'American pro slalom skier. Competes on the Waterski Pro Tour. Also known as Aliaksandra Danisheuskaya, originally from Belarus (BLR). Confirmed Pro entry at Recetto 2026.',
    results:{} },
  { name:'Maise Jacobsen', country:'DEN', div:'women', seasonPts:'',
    bio:'Denmark\'s leading female pro slalom skier. Full name: Maise Hougaard Jacobsen. Has achieved significant success in European youth championships. Confirmed Pro entry at Recetto 2026.',
    results:{} },
];

let currentTab = 'all';
let searchTerm = '';

function placeClass(place) {
  if (place === 1 || place === '1') return 'place-1';
  if (place === 2 || place === '2') return 'place-2';
  if (place === 3 || place === '3') return 'place-3';
  return 'place-other';
}

function renderList() {
  const list = document.getElementById('list');
  const filtered = athletes.filter(a => {
    if (currentTab !== 'all' && a.div !== currentTab) return false;
    if (searchTerm && !a.name.toLowerCase().includes(searchTerm) && !a.country.toLowerCase().includes(searchTerm)) return false;
    return true;
  });

  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty">No skiers found.</div>';
    return;
  }

  list.innerHTML = filtered.map((a, idx) => {
    const flag = FLAGS[a.country] || 'ЁЯП│я╕П';
    const divLabel = a.div === 'men' ? "Men" : "Women";
    const eventRows = EVENTS.map(ev => {
      const r = a.results[ev.key];
      if (!r) return '';
      let placeHtml = '';
      if (r.place === 'DNS' || r.place === 'DNF') {
        placeHtml = `<span class="event-dns">${r.place}</span>`;
      } else {
        const cls = placeClass(r.place);
        placeHtml = `<div class="event-place ${cls}">${r.place}</div>`;
      }
      return `<div class="event-row">
        <div class="event-name"><strong>${ev.name}</strong><br><span style="color:var(--muted);font-size:0.7em">${ev.date} ┬╖ ${ev.location}</span></div>
        <div class="event-score">${r.score}</div>
        ${placeHtml}
      </div>`;
    }).join('');

    const details = eventRows || '<div class="no-data">No 2026 pro event results yet for this skier.</div>';
    const ptsHtml = a.seasonPts ? `<div class="season-pts"><div class="label">2026 Season Standing</div><div class="val">${a.seasonPts}</div></div>` : '';
    const bioHtml = a.bio ? `<div class="ac-bio">${a.bio}</div>` : '';

    return `<div class="athlete-card" onclick="toggleCard(this)">
      <div class="ac-top">
        <div class="ac-flag">${flag}</div>
        <div class="ac-info">
          <div class="ac-name">${a.name}</div>
          <div class="ac-country">${a.country}</div>
        </div>
        <div class="ac-div ${a.div}">${divLabel}</div>
      </div>
      <div class="ac-details">
        ${bioHtml}
        ${details}
        ${ptsHtml}
      </div>
    </div>`;
  }).join('');
}

function toggleCard(el) {
  el.classList.toggle('expanded');
}

function setTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`[data-filter="${tab}"]`).classList.add('active');
  renderList();
}

document.getElementById('search').addEventListener('input', e => {
  searchTerm = e.target.value.toLowerCase().trim();
  renderList();
});

renderList();
</script>
</body>
</html>
