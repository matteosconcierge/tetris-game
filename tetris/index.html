<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris</title>
    <style>
        body {
            background: #202028;
            color: #fff;
            font-family: sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        #game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        canvas {
            border: solid 2px #fff;
            height: 80vh;
        }
        #score { font-size: 2em; margin: 10px 0; }
        .back-btn {
            margin-top: 20px;
            padding: 10px 20px;
            background: #444;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="tetris" width="240" height="400"></canvas>
        <div id="score">Score: 0</div>
    </div>
    <a href="../index.html" class="back-btn">Back to Arcade</a>
    <script src="script.js"></script>
</body>
</html>
